name: Test og deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typesjekk
        run: npm run check

      - name: Enhetstester (workerd + D1)
        run: npm test

      - name: Lag testhemmeligheter for integrasjonstestene
        run: |
          cat > .dev.vars << 'EOF'
          GUEST_PASSPHRASE=ci-gjest-passord
          ADMIN_PASSPHRASE=ci-admin-passord
          SESSION_SECRET=ci-session-secret
          RESERVATION_SECRET=ci-reservation-secret
          EOF

      - name: Klargjør lokal D1
        run: npm run db:migrate

      - name: Integrasjonstester
        run: npm run test:e2e

      - name: Bygg
        run: npm run build

  deploy:
    # Deploy kun fra main – pull requests stopper etter test-jobben
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Bygg
        run: npm run build

      - name: Kjør D1-migrasjoner mot produksjon
        run: npx wrangler d1 migrations apply trippel-navnefest --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy til Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
